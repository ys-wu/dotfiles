# True color — so Powerlevel10k's colors render correctly inside tmux
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"

# Vi-style copy mode (this is your Vim navigation of scrollback)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Sensible defaults
set -g base-index 1          # windows start at 1, not 0
setw -g pane-base-index 1
set -g mouse on              # scroll + click panes
set -sg escape-time 10       # snappier Esc, helps nvim inside tmux

